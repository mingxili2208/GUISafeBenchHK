policy_type: 'ppo'
model_path: 'safebench/agent/model_ckpt/ppo'
model_id: 0
results_folder_path: ''
obs_type: 0

train_episode: 100  # 训练的episode数,初始为2000
eval_in_train_freq: 1
save_freq: 10
buffer_capacity: 8000  # 设置buffer的容量

clip_epsilon: 0.2  # PPO算法中的clip范围
gamma: 0.99 # 下一时刻状态获得的奖励的衰减因子
train_iteration: 20   # how many times training
train_interval: 1     # how often training
policy_lr: 1.0e-4  # 动作策略的学习率
value_lr: 1.0e-4  # 价值网络的学习率
batch_size: 64  # 每次训练的样本数
